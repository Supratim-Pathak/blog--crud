server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All routes fall back to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
